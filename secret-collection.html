<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Collection — Creative code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body.collection-body {
            max-width: 100%;
            width: 100%;
            padding: 4rem 2rem;
            background-color: #ffffff !important;
            background-blend-mode: normal !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow-x: hidden;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--clr-taupe);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s, transform 0.2s;
            z-index: 999;
        }

        .back-link:hover {
            color: var(--clr-blue);
            transform: translateX(-3px);
            background: transparent !important;
        }

        /* Ticket paper container */
        .ticket-wrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            background-image: url('assets/PaperMix-Kraft-16.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            padding: 4.5rem 3.5rem;
            box-sizing: border-box;
            filter: grayscale(1) brightness(1.22) contrast(1.15);
            mix-blend-mode: hard-light;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.2);
            transform: rotate(-1deg);
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            color: #131b23;
        }

        .ticket-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 2px dashed rgba(19, 27, 35, 0.2);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .ticket-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            color: #131b23;
        }

        .ticket-subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        /* Dotted item list */
        .ticket-items-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        /* Dotted scrollbar for ticket */
        .ticket-items-container::-webkit-scrollbar {
            width: 4px;
        }
        .ticket-items-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .ticket-items-container::-webkit-scrollbar-thumb {
            background: rgba(19, 27, 35, 0.2);
            border-radius: 2px;
        }

        .ticket-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
        }

        .item-thumb {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 2px;
        }

        .item-name {
            font-weight: bold;
        }

        .item-dots {
            flex: 1;
            border-bottom: 1px dotted rgba(19, 27, 35, 0.3);
            margin: 0 8px;
            align-self: flex-end;
            margin-bottom: 4px;
        }

        .item-status {
            text-transform: uppercase;
            color: #27ae60;
            font-weight: bold;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* Ticket footer */
        .ticket-footer {
            border-top: 2px dashed rgba(19, 27, 35, 0.2);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.8rem;
        }

        .ticket-total {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .ticket-barcode {
            width: 80%;
            height: 45px;
            background: repeating-linear-gradient(
                90deg,
                #131b23,
                #131b23 2px,
                transparent 2px,
                transparent 5px,
                #131b23 5px,
                #131b23 8px,
                transparent 8px,
                transparent 10px
            );
            margin: 0.5rem 0;
            opacity: 0.8;
        }

        .ticket-serial {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .empty-collection-message {
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 2rem 0;
            opacity: 0.6;
            font-size: 0.95rem;
        }

        /* Clear button to reset progression */
        .clear-btn {
            font-family: 'Outfit', sans-serif;
            background-color: transparent;
            border: 1px solid rgba(19, 27, 35, 0.2);
            color: #131b23;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }
        .clear-btn:hover {
            background-color: #131b23;
            color: #ffffff;
            border-color: #131b23;
        }
    </style>
</head>
<body class="collection-body" style="background-image: url('assets/background-3.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-blend-mode: multiply;">
    <!-- Fullscreen scan texture overlay -->
    <div class="scan-overlay-global"></div>

    <a href="index.html" class="back-link">← Back to Gallery</a>

    <div class="ticket-wrapper">
        <div class="ticket-header">
            <h1 class="ticket-title">Secret drawer</h1>
            <div class="ticket-subtitle">COLLECTED CURIOSITIES RECEIPT</div>
        </div>

        <div class="ticket-items-container" id="collected-list">
            <!-- Items loaded dynamically -->
        </div>

        <div class="ticket-footer">
            <div class="ticket-total" id="collection-total">COLLECTED: 0 ITEMS</div>
            <div class="ticket-barcode"></div>
            <div class="ticket-serial"># 520DD6A7-A997-4DF8-8E36-FC531F0DF61F</div>
            <button class="clear-btn" id="clear-btn">Reset Drawer</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('collected-list');
            const totalLabel = document.getElementById('collection-total');
            const clearBtn = document.getElementById('clear-btn');

            const loadCollection = () => {
                let collected = [];
                try {
                    collected = JSON.parse(localStorage.getItem('collected_objects')) || [];
                } catch(e) {
                    collected = [];
                }

                listContainer.innerHTML = '';
                if (collected.length === 0) {
                    listContainer.innerHTML = '<div class="empty-collection-message">DRAWER IS EMPTY.<br>DRAG AND DROP DECORATIONS INTO THE BASKET ON THE SKETCH PAGES TO COLLECT THEM.</div>';
                    totalLabel.innerText = 'COLLECTED: 0 ITEMS';
                    return;
                }

                collected.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'ticket-item';
                    
                    // Determine Prefix for assets path
                    let cleanSrc = item.src || '';
                    // Clean prefix if it contains '../../assets' or '../assets' because we are at root level
                    cleanSrc = cleanSrc.replace('../../assets/', 'assets/');
                    cleanSrc = cleanSrc.replace('../assets/', 'assets/');

                    row.innerHTML = `
                        <div class="item-left">
                            <img src="${cleanSrc}" class="item-thumb" alt="" aria-hidden="true">
                            <span class="item-name">${item.name}</span>
                        </div>
                        <div class="item-dots"></div>
                        <span class="item-status">Collected</span>
                    `;
                    listContainer.appendChild(row);
                });

                totalLabel.innerText = `COLLECTED: ${collected.length} ITEM${collected.length > 1 ? 'S' : ''}`;
            };

            clearBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to reset your Secret Drawer? This will clear all collected items.')) {
                    localStorage.removeItem('collected_objects');
                    loadCollection();
                }
            });

            loadCollection();
        });
    </script>
</body>
</html>
