<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Collection — Creative code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            font-family: 'Outfit', sans-serif !important;
        }

        body.collection-body {
            max-width: 100%;
            width: 100%;
            padding: 4rem 2rem;
            background-color: #ffffff !important;
            background-blend-mode: normal !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow-x: hidden;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--clr-taupe);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s, transform 0.2s;
            z-index: 999;
        }

        .back-link:hover {
            color: var(--clr-blue);
            transform: translateX(-3px);
            background: transparent !important;
        }

        /* Ticket container */
        .ticket-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Reset paper button peeking from behind */
        .reset-paper-btn {
            position: absolute;
            bottom: -24px;
            right: 40px;
            background-image: url('assets/PaperMix-Kraft-09-thumb.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            filter: grayscale(1) brightness(1.22) contrast(1.15);
            border: none;
            padding: 24px 28px 12px; /* extra top padding for overlap */
            font-size: 0.95rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #131b23;
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
            transform: rotate(-3deg);
            cursor: pointer;
            z-index: 1;
            transition: transform 0.2s ease, bottom 0.2s ease, filter 0.2s ease;
        }

        .reset-paper-btn:hover {
            transform: rotate(-1deg) scale(1.05);
            bottom: -34px;
            filter: grayscale(0.15) brightness(1.22) contrast(1.15);
            box-shadow: 0 6px 14px rgba(0,0,0,0.25);
        }

        /* Ticket paper container */
        .ticket-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            background-image: url('assets/PaperMix-Kraft-16.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            padding: 4.5rem 3.5rem;
            box-sizing: border-box;
            filter: grayscale(1) brightness(1.22) contrast(1.15);
            mix-blend-mode: hard-light;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.2);
            transform: rotate(-1deg);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            color: #131b23;
        }

        .ticket-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-bottom: 0;
            margin-bottom: 1.5rem;
        }

        .ticket-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            color: #131b23;
        }

        .ticket-subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        /* Dotted item list - single column vertical display */
        .ticket-items-container {
            padding: 4.5rem 0.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .ticket-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .item-thumb {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
            background: transparent;
            border: none;
            padding: 0;
            transition: transform 0.2s ease, filter 0.2s ease;
            cursor: pointer;
        }

        .item-thumb:hover {
            transform: scale(1.15) rotate(2deg);
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.3));
        }

        /* Hover tooltip card with paper texture background */
        .item-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) scale(0.9) rotate(-3deg);
            background-image: url('assets/PaperMix-Kraft-09-thumb.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            filter: grayscale(1) brightness(1.2) contrast(1.1);
            color: #131b23;
            padding: 10px 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .ticket-item:hover .item-tooltip {
            opacity: 0.95;
            transform: translateX(-50%) scale(1) rotate(1deg);
        }

        .tooltip-name {
            font-family: 'Outfit', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .tooltip-status {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            color: #27ae60;
            text-transform: uppercase;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Ticket footer */
        .ticket-footer {
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.8rem;
        }

        .ticket-total {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .ticket-barcode {
            width: 80%;
            height: 45px;
            background: repeating-linear-gradient(
                90deg,
                #131b23,
                #131b23 2px,
                transparent 2px,
                transparent 5px,
                #131b23 5px,
                #131b23 8px,
                transparent 8px,
                transparent 10px
            );
            margin: 0.5rem 0;
            opacity: 0.8;
        }

        .ticket-serial {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        /* ----------------------------------------------------
           NEW GAMIFIED UPDATE: RARE SIDEBAR & CARD EFFECTS
        ---------------------------------------------------- */
        .collection-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 5rem;
            width: 100%;
            max-width: 960px;
            margin-top: 2rem;
            position: relative;
        }

        @media (max-width: 900px) {
            .collection-layout {
                flex-direction: column;
                align-items: center;
                gap: 3rem;
            }
            .rare-sidebar {
                flex-direction: row !important;
                flex-wrap: wrap;
                justify-content: center;
                padding-left: 0 !important;
            }
            .rare-arrow {
                transform: rotate(90deg) !important;
                margin: 0 -10px !important;
            }
        }

        .rare-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            z-index: 10;
            padding-left: 2rem;
        }

        .rare-arrow {
            width: 80px;
            height: auto;
            opacity: 0.85;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
            pointer-events: none;
            user-select: none;
        }

        .rare-item-card {
            position: relative;
            width: 120px;
            height: 120px;
            background-image: url('assets/PaperMix-Kraft-09-thumb.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            filter: grayscale(1) brightness(1.2) contrast(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, filter 0.3s ease;
            overflow: hidden;
            --mx: 50%;
            --my: 50%;
        }

        /* Completely darken locked state */
        .rare-item-card.locked {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1) !important;
            cursor: not-allowed;
        }

        .rare-item-card.locked img {
            opacity: 0.85 !important;
            filter: brightness(0) !important;
        }

        .rare-item-card:not(.locked) {
            filter: none !important;
        }

        .rare-item-card:not(.locked):hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .rare-img {
            width: 85px;
            height: 85px;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.2s ease, filter 0.3s ease;
        }

        .rare-item-card:not(.locked):hover .rare-img {
            transform: scale(1.05);
        }

        /* Always-active Rare Item Glows (Only applies when unlocked) */
        .rare-item-card:not(.locked) .rare-img.rare-item-glow-1 {
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.45));
            animation: rarePulse1 3.5s ease-in-out infinite alternate;
        }
        @keyframes rarePulse1 {
            0% { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.2)); }
            100% { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.55)); }
        }

        .rare-item-card:not(.locked) .rare-img.rare-item-glow-2 {
            filter: drop-shadow(0 0 8px rgba(46, 204, 113, 0.75));
            animation: rarePulse2 2.8s ease-in-out infinite alternate;
        }
        @keyframes rarePulse2 {
            0% { filter: drop-shadow(0 0 3px rgba(46, 204, 113, 0.45)); }
            100% { filter: drop-shadow(0 0 12px rgba(46, 204, 113, 0.9)) drop-shadow(0 0 3px rgba(46, 204, 113, 0.4)); }
        }

        .rare-item-card:not(.locked) .rare-img.rare-item-glow-3 {
            filter: drop-shadow(0 0 10px rgba(231, 76, 60, 0.85));
            animation: rarePulse3 2.2s ease-in-out infinite alternate;
        }
        @keyframes rarePulse3 {
            0% { filter: drop-shadow(0 0 4px rgba(231, 76, 60, 0.55)); }
            100% { filter: drop-shadow(0 0 18px rgba(231, 76, 60, 0.95)) drop-shadow(0 0 5px rgba(231, 76, 60, 0.5)); }
        }

        .rare-item-card:not(.locked) .rare-img.rare-item-glow-4 {
            filter: drop-shadow(0 0 12px rgba(155, 89, 182, 0.8)) drop-shadow(0 0 4px rgba(142, 68, 173, 0.4));
            animation: rarePulse4 3.2s ease-in-out infinite alternate;
        }
        @keyframes rarePulse4 {
            0% { filter: drop-shadow(0 0 5px rgba(155, 89, 182, 0.5)) drop-shadow(0 0 2px rgba(142, 68, 173, 0.3)); }
            100% { filter: drop-shadow(0 0 20px rgba(155, 89, 182, 0.9)) drop-shadow(0 0 8px rgba(142, 68, 173, 0.6)); }
        }

        .rare-item-card:not(.locked) .rare-img.rare-item-glow-5 {
            filter: drop-shadow(0 0 15px rgba(241, 196, 15, 0.9)) drop-shadow(0 0 6px rgba(243, 156, 18, 0.5));
            animation: rarePulse5 2s ease-in-out infinite alternate;
        }
        @keyframes rarePulse5 {
            0% { filter: drop-shadow(0 0 6px rgba(241, 196, 15, 0.55)) drop-shadow(0 0 2px rgba(243, 156, 18, 0.35)); }
            100% { filter: drop-shadow(0 0 28px rgba(241, 196, 15, 1)) drop-shadow(0 0 12px rgba(243, 156, 18, 0.75)); }
        }

        .rare-item-card:not(.locked) .rare-img.rare-item-glow-6 {
            filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 8px rgba(241, 196, 15, 0.65));
            animation: rarePulse6 2.4s ease-in-out infinite alternate;
        }
        @keyframes rarePulse6 {
            0% { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 3px rgba(241, 196, 15, 0.45)); }
            100% { filter: drop-shadow(0 0 34px rgba(255, 255, 255, 1)) drop-shadow(0 0 16px rgba(241, 196, 15, 0.85)) drop-shadow(0 0 4px rgba(255, 255, 255, 0.5)); }
        }

        /* Tooltip on card hover */
        .rare-card-tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #131b23;
            color: #fff;
            padding: 4px 10px;
            font-size: 0.75rem;
            white-space: nowrap;
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 10;
        }

        .rare-item-card:not(.locked):hover .rare-card-tooltip {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Shine reflection effect base */
        .rare-card-shine {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .rare-item-card:not(.locked):hover .rare-card-shine {
            opacity: 1;
        }

        /* Glow effect base */
        .rare-card-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.3s ease;
            opacity: 0.3;
        }

        .rare-item-card:not(.locked):hover .rare-card-glow {
            opacity: 0.85;
        }

        /* ITEM 1: Slight shiny effect */
        #rare-card-1 .rare-card-shine {
            background: linear-gradient(
                135deg,
                transparent 0%,
                transparent 40%,
                rgba(255, 255, 255, 0.45) 50%,
                transparent 60%,
                transparent 100%
            );
            background-size: 200% 200%;
            animation: slowSweep 4s linear infinite;
        }
        @keyframes slowSweep {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ITEM 2: Jade glowy effect */
        #rare-card-2 .rare-card-glow {
            box-shadow: inset 0 0 20px rgba(46, 204, 113, 0.6), 0 0 15px rgba(46, 204, 113, 0.4);
            background: radial-gradient(circle at var(--mx) var(--my), rgba(46, 204, 113, 0.25) 0%, transparent 70%);
        }
        #rare-card-2 .rare-card-shine {
            background: radial-gradient(circle at var(--mx) var(--my), rgba(255, 255, 255, 0.5) 0%, rgba(46, 204, 113, 0.2) 50%, transparent 80%);
        }

        /* ITEM 3: Red shiny shaft and glowy effect */
        #rare-card-3 .rare-card-glow {
            box-shadow: inset 0 0 20px rgba(231, 76, 60, 0.7), 0 0 20px rgba(231, 76, 60, 0.5);
            background: radial-gradient(circle at var(--mx) var(--my), rgba(231, 76, 60, 0.25) 0%, transparent 60%);
        }
        #rare-card-3 .rare-card-shine {
            background: linear-gradient(
                to bottom,
                rgba(231, 76, 60, 0) 0%,
                rgba(231, 76, 60, 0.4) var(--my),
                rgba(255, 255, 255, 0.7) calc(var(--my) + 5%),
                rgba(231, 76, 60, 0.4) calc(var(--my) + 10%),
                rgba(231, 76, 60, 0) 100%
            );
        }

        /* ITEM 4: Cosmic Hourglass - slow shiny particles and slight glow */
        #rare-card-4 .rare-card-glow {
            box-shadow: inset 0 0 20px rgba(155, 89, 182, 0.6), 0 0 15px rgba(155, 89, 182, 0.3);
            background: radial-gradient(circle at var(--mx) var(--my), rgba(155, 89, 182, 0.25) 0%, transparent 70%);
        }
        #rare-card-4 .rare-card-shine {
            background: radial-gradient(circle at var(--mx) var(--my), rgba(255, 255, 255, 0.4) 0%, transparent 60%);
        }
        .particles-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }
        .rare-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #e8daef;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            animation: floatUp 3s ease-in-out infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(130px) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10px) translateX(var(--pdx, 10px)); opacity: 0; }
        }

        /* ITEM 5: SUPER shiny metal effect and gold yellow light glow effect */
        #rare-card-5 .rare-card-glow {
            box-shadow: inset 0 0 25px rgba(241, 196, 15, 0.8), 0 0 25px rgba(241, 196, 15, 0.6);
            background: radial-gradient(circle at var(--mx) var(--my), rgba(241, 196, 15, 0.3) 0%, transparent 80%);
        }
        #rare-card-5 .rare-card-shine {
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.75) 45%,
                rgba(241, 196, 15, 0.8) 50%,
                rgba(255,255,255,0.75) 55%,
                rgba(255,255,255,0) 100%
            );
            background-size: 250% 250%;
            animation: superMetal 2.5s ease infinite alternate;
        }
        @keyframes superMetal {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* ITEM 6: super shiny glass glowy effect with reflections and yellow glow effect */
        #rare-card-6 {
            background-image: none !important;
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }
        #rare-card-6 .rare-card-glow {
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.5), 0 0 20px rgba(241, 196, 15, 0.5);
            background: radial-gradient(circle at var(--mx) var(--my), rgba(241, 196, 15, 0.25) 0%, transparent 70%);
        }
        #rare-card-6 .rare-card-shine {
            background: linear-gradient(
                to right,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.85) var(--mx),
                rgba(255,255,255,0) 100%
            );
        }

        /* BONUS ITEM (inside ticket list): Yellow shiny and glow effect */
        .bonus-item-collected {
            animation: bonusPulse 2.5s ease-in-out infinite alternate !important;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.6) !important;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .bonus-item-collected::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.6) 50%, transparent);
            background-size: 200% 200%;
            animation: slowSweep 3s linear infinite;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes bonusPulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 25px rgba(241, 196, 15, 0.8); }
        }
    </style>
</head>

            <img src="assets/drawn-arrow.svg" class="rare-arrow" alt="">

                <div class="rare-card-shine"></div>
                <img src="assets/rare-item-2.png" class="rare-img rare-item-glow-2" alt="Jade Scarab">
                <div class="rare-card-tooltip">Jade Scarab</div>
            </div>

            <img src="assets/drawn-arrow.svg" class="rare-arrow" alt="">

            <div class="rare-item-card locked" data-rare-filename="rare-item-3.png" id="rare-card-3">
                <div class="rare-card-glow"></div>
                <div class="rare-card-shine"></div>
                <img src="assets/rare-item-3.png" class="rare-img rare-item-glow-3" alt="Ruby Crystal">
                <div class="rare-card-tooltip">Ruby Crystal</div>
            </div>

            <img src="assets/drawn-arrow.svg" class="rare-arrow" alt="">

            <div class="rare-item-card locked" data-rare-filename="rare-item-4.png" id="rare-card-4">
                <div class="rare-card-glow"></div>
                <div class="rare-card-shine"></div>
                <div class="particles-container"></div>
                <img src="assets/rare-item-4.png" class="rare-img rare-item-glow-4" alt="Cosmic Hourglass">
                <div class="rare-card-tooltip">Cosmic Hourglass</div>
            </div>

            <img src="assets/drawn-arrow.svg" class="rare-arrow" alt="">

            <div class="rare-item-card locked" data-rare-filename="rare-item-5.png" id="rare-card-5">
                <div class="rare-card-glow"></div>
                <div class="rare-card-shine"></div>
                <img src="assets/rare-item-5.png" class="rare-img rare-item-glow-5" alt="Golden Gear">
                <div class="rare-card-tooltip">Golden Gear</div>
            </div>

            <img src="assets/drawn-arrow.svg" class="rare-arrow" alt="">

            <div class="rare-item-card locked" data-rare-filename="rare-item-6.png" id="rare-card-6">
                <div class="rare-card-glow"></div>
                <div class="rare-card-shine"></div>
                <img src="assets/rare-item-6.png" class="rare-img rare-item-glow-6" alt="Crystal Prism">
                <div class="rare-card-tooltip">Crystal Prism</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('collected-list');
            const totalLabel = document.getElementById('collection-total');
            const clearBtn = document.getElementById('clear-btn');

            const startOrganicShift = (el) => {
                el.style.transition = 'transform 1.8s cubic-bezier(0.25, 0.8, 0.25, 1)';
                
                const shift = () => {
                    const dx = (Math.random() * 6 - 3).toFixed(1); // -3px to 3px
                    const dy = (Math.random() * 6 - 3).toFixed(1); // -3px to 3px
                    const rot = (Math.random() * 12 - 6).toFixed(1); // -6deg to 6deg
                    
                    el.style.transform = `translate3d(${dx}px, ${dy}px, 0) rotate(${rot}deg)`;
                    
                    const nextDelay = 5000 + Math.random() * 55000; // 5s to 60s
                    setTimeout(shift, nextDelay);
                };
                
                setTimeout(shift, 500 + Math.random() * 5000);
            };

            const updateRareSidebar = (collected) => {
                const cards = document.querySelectorAll('.rare-item-card');
                cards.forEach(card => {
                    const filename = card.getAttribute('data-rare-filename');
                    const isCollected = collected.some(item => {
                        const itemFile = item.filename || '';
                        return itemFile.toLowerCase() === filename.toLowerCase();
                    });

                    if (isCollected) {
                        card.classList.remove('locked');

                        // Bind mousemove for shiny reflection coordinates
                        if (!card.dataset.boundMousemove) {
                            card.dataset.boundMousemove = 'true';
                            card.addEventListener('mousemove', (e) => {
                                const rect = card.getBoundingClientRect();
                                const x = e.clientX - rect.left;
                                const y = e.clientY - rect.top;
                                const px = ((x / rect.width) * 100).toFixed(1);
                                const py = ((y / rect.height) * 100).toFixed(1);
                                card.style.setProperty('--mx', `${px}%`);
                                card.style.setProperty('--my', `${py}%`);
                            });

                            card.addEventListener('mouseleave', () => {
                                card.style.setProperty('--mx', '50%');
                                card.style.setProperty('--my', '50%');
                            });
                        }

                        // Cosmic Hourglass Particles Effect
                        if (card.id === 'rare-card-4') {
                            const container = card.querySelector('.particles-container');
                            if (container && container.children.length === 0) {
                                for (let i = 0; i < 8; i++) {
                                    const p = document.createElement('div');
                                    p.className = 'rare-particle';
                                    p.style.left = `${Math.random() * 80 + 10}%`;
                                    p.style.animationDelay = `${Math.random() * 3}s`;
                                    p.style.setProperty('--pdx', `${(Math.random() * 40 - 20).toFixed(1)}px`);
                                    container.appendChild(p);
                                }
                            }
                        }
                    } else {
                        card.classList.add('locked');
                        const container = card.querySelector('.particles-container');
                        if (container) container.innerHTML = '';
                    }
                });
            };

            const loadCollection = () => {
                let collected = [];
                try {
                    collected = JSON.parse(localStorage.getItem('collected_objects')) || [];
                } catch(e) {
                    collected = [];
                }

                listContainer.innerHTML = '';
                
                // Exclude rare items from the main receipt ticket list
                const ordinaryAndBonusCollected = collected.filter(item => {
                    const isRare = item.filename && item.filename.startsWith('rare-item-');
                    return !isRare;
                });

                if (ordinaryAndBonusCollected.length === 0) {
                    totalLabel.innerText = 'COLLECTED: 0 ITEMS';
                } else {
                    ordinaryAndBonusCollected.forEach(item => {
                        const cell = document.createElement('div');
                        cell.className = 'ticket-item';
                        if (item.filename === 'bonus-item.png') {
                            cell.classList.add('bonus-item-collected');
                        }
                        
                        // Determine Prefix for assets path
                        let cleanSrc = item.src || '';
                        cleanSrc = cleanSrc.replace('../../assets/', 'assets/');
                        cleanSrc = cleanSrc.replace('../assets/', 'assets/');

                        cell.innerHTML = `
                            <img src="${cleanSrc}" class="item-thumb" alt="" aria-hidden="true">
                            <div class="item-tooltip">
                                <span class="tooltip-name">${item.name}</span>
                                <span class="tooltip-status">Collected</span>
                            </div>
                        `;
                        listContainer.appendChild(cell);
                        startOrganicShift(cell);
                    });

                    totalLabel.innerText = `COLLECTED: ${ordinaryAndBonusCollected.length} ITEM${ordinaryAndBonusCollected.length > 1 ? 'S' : ''}`;
                }

                // Update locked/unlocked state for rare sidebar cards
                updateRareSidebar(collected);
            };

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    if (confirm('Are you sure you want to reset your Secret Drawer? This will clear all collected items.')) {
                        localStorage.removeItem('collected_objects');
                        loadCollection();
                    }
                });
            }

            loadCollection();
        });
    </script>
</body>
</html>
