      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="30%" stop-color="#fbc02d"/>
      <stop offset="70%" stop-color="#f57f17"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#fbc02d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f57f17" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer Compass Ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#goldBright)" stroke-width="3.5"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#fbc02d" stroke-width="1" stroke-dasharray="2,6"/>
