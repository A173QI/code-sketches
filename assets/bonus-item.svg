  <path d="M50 50 L50 20 L42 42 Z M50 50 L50 80 L58 58 Z M50 50 L80 50 L58 58 Z M50 50 L20 50 L42 42 Z" fill="#e65100" opacity="0.8"/>
  <!-- Central core -->
