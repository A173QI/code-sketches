<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100" height="60">
  <defs>
    <!-- Paper texture shadow -->
    <filter id="paperShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Torn paper shape with realistic rough edges -->
  <path d="M 12 10 
           C 25 8, 45 12, 60 9 
           C 72 7, 85 11, 89 12 
           C 92 22, 88 35, 91 48 
           C 80 50, 65 46, 50 49 
           C 35 52, 22 47, 10 49 
           C 8 38, 13 25, 12 10 Z" 
        fill="#fcfcf9" 
        stroke="#e5e0d8" 
        stroke-width="1.5" 
        filter="url(#paperShadow)"/>
  
  <!-- Subtle paper guidelines / grid lines to look authentic -->
  <path d="M 18 20 L 82 20 M 18 30 L 82 30 M 18 40 L 82 40" stroke="#f0ebdf" stroke-width="1" opacity="0.7"/>
  
  <!-- Hand-drawn charcoal-style arrow pointing down -->
  <path d="M 50 18 
           C 51 28, 49 32, 50 42 
           M 42 34 
           C 45 38, 48 40, 50 42 
           C 53 40, 56 37, 58 33" 
        fill="none" 
        stroke="#2c3e50" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.85"/>
</svg>
